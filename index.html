<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Charting</title>

<style>
body { font-family: system-ui, sans-serif; margin: 10px; }
.section { border: 1px solid #ccc; padding: 10px; margin-bottom: 12px; border-radius: 6px; }
.grid { display: flex; flex-wrap: wrap; gap: 6px; }
button { padding: 10px; font-size: 14px; }
.selected { background:#2e7d32; color:#fff; }
.toggle-on { background:#1976d2; color:#fff; }
.score { font-size:18px; font-weight:bold; }
</style>
</head>

<body>

<h2>🎾 Match Setup</h2>
<div class="section">
  <input id="playerName" placeholder="Player Name"><br>
  <input id="opponentName" placeholder="Opponent Name"><br>
  <select id="courtType">
    <option>Hard</option><option>Clay</option><option>Grass</option>
    <option>Indoor</option><option>Other</option>
  </select><br>
  <input id="weather" placeholder="Weather">
</div>

<h2>⚙️ Tracking Options</h2>
<div class="section grid">
  <button onclick="toggle('serveDir',this)">Serve Direction</button>
  <button onclick="toggle('serveType',this)">Serve Type</button>
  <button onclick="toggle('forced',this)">Forced / Unforced</button>
  <button onclick="toggle('rally',this)">Rally Length</button>
</div>

<h2>🎯 Server</h2>
<div class="section grid serverGroup">
  <button onclick="selectGroup(this,'server');current.server='player'">Player Serving</button>
  <button onclick="selectGroup(this,'server');current.server='opponent'">Opponent Serving</button>
</div>

<h2>🎯 Serve</h2>
<div class="section grid serveGroup">
  <button onclick="selectGroup(this,'serve');setServe(1,true)">1st In</button>
  <button onclick="selectGroup(this,'serve');setServe(1,false)">1st Out</button>
  <button onclick="selectGroup(this,'serve');setServe(2,true)">2nd In</button>
  <button onclick="selectGroup(this,'serve');setServe(2,false)">2nd Out</button>
</div>

<div class="section" id="conditional"></div>

<h2>🏁 Point Ending Shot</h2>
<div class="section grid shotGroup">
  <button onclick="selectGroup(this,'shot');current.shot='FH Winner'">FH Winner</button>
  <button onclick="selectGroup(this,'shot');current.shot='FH Error'">FH Error</button>
  <button onclick="selectGroup(this,'shot');current.shot='BH Winner'">BH Winner</button>
  <button onclick="selectGroup(this,'shot');current.shot='BH Error'">BH Error</button>
  <button onclick="selectGroup(this,'shot');current.shot='FH Volley'">FH Volley</button>
  <button onclick="selectGroup(this,'shot');current.shot='BH Volley'">BH Volley</button>
  <button onclick="selectGroup(this,'shot');current.shot='Overhead'">Overhead</button>
</div>

<h2>🎯 Break Point</h2>
<div class="section grid breakGroup">
  <button onclick="selectGroup(this,'break');current.breakPoint=true">Break Point</button>
  <button onclick="selectGroup(this,'break');current.breakPoint=false">Not Break Point</button>
</div>

<h2>👤 Point Winner</h2>
<div class="section grid winnerGroup">
  <button onclick="selectGroup(this,'winner');current.winner='player'">Player</button>
  <button onclick="selectGroup(this,'winner');current.winner='opponent'">Opponent</button>
</div>

<div class="section score" id="scoreDisplay"></div>

<div class="section">
  <button onclick="submitPoint()">Submit Point</button>
</div>

<script>
/* ---------- MATCH STATE ---------- */
const matchId = `MATCH_${new Date().toISOString().slice(0,10)}_${Math.floor(Math.random()*10000)}`;
let setNumber = 1;
let isTiebreak = false;

let current = {};
let score = {points:[0,0],games:[0,0]};
const pts=['0','15','30','40','Ad'];

let config = { serveDir:false, serveType:false, forced:false, rally:false };

/* ---------- UI ---------- */
function toggle(k,btn){ config[k]=!config[k]; btn.classList.toggle('toggle-on'); renderConditional(); }

function selectGroup(btn,group){
  document.querySelectorAll(`.${group}Group button`)
    .forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* ---------- CONDITIONAL ---------- */
function renderConditional(){
  const c=document.getElementById('conditional');
  c.innerHTML='';

  if(config.serveDir){
    c.innerHTML+=`
    <h3>Serve Direction</h3>
    <div class="grid serveDirGroup">
      <button onclick="selectGroup(this,'serveDir');current.serveDirection='Wide'">Wide</button>
      <button onclick="selectGroup(this,'serveDir');current.serveDirection='Body'">Body</button>
      <button onclick="selectGroup(this,'serveDir');current.serveDirection='T'">T</button>
    </div>`;
  }

  if(config.serveType){
    c.innerHTML+=`
    <h3>Serve Type</h3>
    <div class="grid serveTypeGroup">
      <button onclick="selectGroup(this,'serveType');current.serveType='Flat'">Flat</button>
      <button onclick="selectGroup(this,'serveType');current.serveType='Slice'">Slice</button>
      <button onclick="selectGroup(this,'serveType');current.serveType='Kick'">Kick</button>
    </div>`;
  }

  if(config.forced){
    c.innerHTML+=`
    <h3>Error Type</h3>
    <div class="grid forcedGroup">
      <button onclick="selectGroup(this,'forced');current.forced='Forced'">Forced</button>
      <button onclick="selectGroup(this,'forced');current.forced='Unforced'">Unforced</button>
    </div>`;
  }

  if(config.rally){
    c.innerHTML+=`
    <h3>Rally Length</h3>
    <div class="grid rallyGroup">
      <button onclick="selectGroup(this,'rally');current.rally='0-2'">0–2</button>
      <button onclick="selectGroup(this,'rally');current.rally='3-6'">3–6</button>
      <button onclick="selectGroup(this,'rally');current.rally='7+'">7+</button>
    </div>`;
  }
}

/* ---------- LOGIC ---------- */
function setServe(n,inn){ current.serve={number:n,in:inn}; }
function getServeSide(){ return (score.points[0]+score.points[1])%2===0?'Deuce':'Ad'; }

function submitPoint(){
  if(!current.winner || !current.server) return alert('Select winner & server');

  current.matchId = matchId;
  current.setNumber = setNumber;
  current.isTiebreak = isTiebreak;
  current.serveSide = getServeSide();

  const p=current.winner==='player'?0:1;
  score.points[p]++;
  if(score.points[p]>=4 && score.points[p]-score.points[1-p]>=2){
    score.games[p]++; score.points=[0,0];
  }

  current.timestamp=new Date().toISOString();
  sendToSheets(current);
  current={};
  updateScore();
}

function updateScore(){
  scoreDisplay.innerText=
    `Points ${pts[score.points[0]]}-${pts[score.points[1]]} | Games ${score.games[0]}-${score.games[1]}`;
}

/* ✅ SAFE G‑Apps fetch (no preflight) */
function sendToSheets(point){
  fetch('https://script.google.com/macros/s/AKfycbywKyH0kTIRrR3QKKbLXDHcbBAX-uAoxiBiKf8jA4iPSfY2k5Y_z-1dz6J_HDM9xbFw/exec',{
    method:'POST',
    body:JSON.stringify({
      ...point,
      playerName:playerName.value,
      opponentName:opponentName.value,
      courtType:courtType.value,
      weather:weather.value
    })
  });
}
</script>

</body>
</html>
